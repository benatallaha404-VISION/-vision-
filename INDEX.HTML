/* OOP CSS CODE from Zaeni Ahmad */
.card {
  width: fit-content;
  height: fit-content;
  background-color: rgba(49, 49, 49, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px 15px;
  gap: 35px;
  overflow: hidden;
  border-radius: 27px;
  box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.055);margin: 15px;
  
}

/* for all social containers*/
.card a {
  width: 52px;
  height: 52px;
  background-color: rgba(117, 117, 117, 0);
  display: flex;
  align-items: center;
  border-radius: 10px;
  justify-content: center;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.15, 0.83, 0.66, 1);
}

.card a:hover {
  transform: scale(1.2);
  border-radius: 15px;
}
/*instagram*/
.card a:nth-child(1):hover {
  background-color: #d62976;
}
/* twitter*/
.card a:nth-child(2):hover {
  background-color: #00acee;
}
/* linkdin*/
.card a:nth-child(3):hover {
  background-color: #0072b1;
}
/* Whatsapp*/
.card a:nth-child(4):hover {
  background-color: #25d366;
}

.card a:active {
  transform: scale(1.1);
  transition-duration: 0.3s;
}

/*first-child*/
.card a svg:first-child {
  display: flex;
  scale: 1.3;
  position: absolute;
  width: 17px;
  opacity: 1;
  transform: translateY(0px);
  transition: all 0.4s cubic-bezier(0.15, 0.83, 0.66, 1);
}

.card a svg:first-child path {
  fill: rgb(255, 255, 255);
}

.card a:hover svg:first-child {
  transform: translateY(-40px);
  opacity: 0;
}
/*last-child*/
.card a svg:last-child {
  display: flex;
  position: absolute;
  width: 17px;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.15, 0.83, 0.66, 1);
}
.card a svg:last-child path {
  fill: rgb(255, 255, 255);
}

.card a:hover svg:last-child {
  opacity: 1;
  transform: translateY(0px);
}

    .start-btn{
    display:inline-block;
    padding:15px 45px;
    border-radius:30px;
    background:#00aaff;
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:.3s;
}

.start-btn:hover{
    background:#0077ff;
}
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

height:100vh;
overflow:hidden;
color:white;

}



/* Video */


.background-video{

position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;

}



.overlay{

position:absolute;
width:100%;
height:100%;

background:
linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.8)
);

z-index:-1;

}



/* Header */


header{

height:80px;

display:flex;
justify-content:space-between;
align-items:center;



}



header h2{

font-size:30px;
letter-spacing:3px;

}


nav a{

color:white;
text-decoration:none;

margin-left:40px;

font-size:18px;

transition:.3s;

}


nav a:hover{

color:#00aaff;

}



/* Hero */


.hero{

height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}


.hero h1{

font-size:70px;

letter-spacing:5px;

}


.hero p{

font-size:25px;

margin:20px;

color:#ccc;

}



button{

padding:15px 45px;

border:none;

border-radius:30px;

background:#00aaff;

color:white;

font-size:18px;

cursor:pointer;

}



/* Floating Icons */


.icon{

position:absolute;

width:90px;

animation:float 6s infinite ease-in-out;

}



.premiere{

top:20%;
left:15%;

}



.photoshop{

top:60%;
left:10%;

animation-delay:1s;

}



.illustrator{

top:25%;
right:15%;

animation-delay:2s;

}



.after{

bottom:15%;
right:20%;

animation-delay:3s;

}



.lightroom{

bottom:20%;
left:45%;

animation-delay:4s;

}





@keyframes float{


0%{

transform:translateY(0px) rotate(0deg);

}


50%{

transform:translateY(-40px) rotate(15deg);

}


100%{

transform:translateY(0px) rotate(0deg);

}


}
</style>
